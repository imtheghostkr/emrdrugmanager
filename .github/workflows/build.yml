name: build

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build Windows binary
        run: go build -trimpath -ldflags="-s -w" -o dist\drug-storage-bridge.exe .\cmd\drug-storage-bridge
